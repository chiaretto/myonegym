<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyOneGym — Settings (reference mockup)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --surface-0: #F4EEEC;
      --surface-1: #FAF6F5;
      --surface-2: #FFFFFF;
      --text-primary: #1A1614;
      --text-secondary: #6B615F;
      --text-muted: #A29996;
      --border: rgba(26, 22, 20, 0.09);
      --border-strong: rgba(26, 22, 20, 0.18);
      --bg-accent: #F7EAE7;
      --border-accent: #D9B6B1;
      --text-accent: #7A3634;
      --fill-accent: #B8524E;
      --on-accent: #FFFFFF;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #1B1817;
        --surface-1: #221E1D;
        --surface-2: #2A2624;
        --text-primary: #F5EFED;
        --text-secondary: #A79E9C;
        --text-muted: #6B615F;
        --border: rgba(245, 239, 237, 0.12);
        --border-strong: rgba(245, 239, 237, 0.24);
        --bg-accent: #3B2A28;
        --border-accent: #6D3E3A;
        --text-accent: #E6B5B0;
        --fill-accent: #C77373;
        --on-accent: #1A1614;
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--surface-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: var(--font-sans);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      width: 340px;
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 28px;
      padding: 14px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 2px 6px 0; font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .status-bar .right { display: inline-flex; gap: 6px; align-items: center; }

    .detail-bar { display: flex; align-items: center; gap: 8px; padding: 2px 2px 4px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 10px; border: 0.5px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 17px; cursor: pointer; flex-shrink: 0; font-family: inherit; }
    .bar-title { font-size: 16px; font-weight: 500; color: var(--text-primary); }

    .group-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 500; padding: 4px 4px 0; }
    .group { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 6px; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; width: 100%; background: none; border: 0; text-align: left; cursor: pointer; color: var(--text-primary); font-family: inherit; }
    .row + .row { border-top: 0.5px solid var(--border); }
    .row-ic { width: 32px; height: 32px; border-radius: 9px; background: var(--bg-accent); color: var(--text-accent); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .row-ic.solid { background: var(--fill-accent); color: var(--on-accent); }
    .row-body { flex: 1; min-width: 0; }
    .row-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .row-sub { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
    .row-sub.warn { color: var(--text-accent); }
    .row-meta { font-size: 12px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .chev { color: var(--text-muted); font-size: 16px; }

    .active-gym { background: var(--bg-accent); border: 0.5px solid var(--border-accent); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
    .ag-ic { width: 36px; height: 36px; border-radius: 10px; background: var(--surface-2); color: var(--text-accent); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ag-body { flex: 1; min-width: 0; }
    .ag-label { font-size: 11px; color: var(--text-accent); font-weight: 500; opacity: 0.85; }
    .ag-name { font-size: 15px; font-weight: 500; color: var(--text-accent); margin-top: 1px; }

    .footer-hint { text-align: center; font-size: 11px; color: var(--text-muted); padding: 8px 8px 0; line-height: 1.5; }
    .home-indicator { width: 96px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 10px auto 0; }
  </style>
</head>
<body>
  <main class="phone" aria-label="Configurações">
    <div class="status-bar" aria-hidden="true">
      <span>9:41</span>
      <span class="right"><i class="ti ti-wifi"></i><i class="ti ti-battery"></i></span>
    </div>

    <div class="detail-bar">
      <button class="icon-btn" aria-label="Voltar"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <span class="bar-title">Configurações</span>
    </div>

    <div class="active-gym" role="button" tabindex="0" aria-label="Trocar academia ativa">
      <div class="ag-ic" aria-hidden="true"><i class="ti ti-building"></i></div>
      <div class="ag-body">
        <div class="ag-label">Academia ativa</div>
        <div class="ag-name">Academia Central</div>
      </div>
      <i class="ti ti-chevron-down chev" aria-hidden="true"></i>
    </div>

    <!-- Cadastros -->
    <div>
      <div class="group-label">Cadastros</div>
      <div class="group">
        <button class="row">
          <span class="row-ic" aria-hidden="true"><i class="ti ti-building"></i></span>
          <span class="row-body">
            <div class="row-title">Academias</div>
            <div class="row-sub">Ao criar, copie os pesos de outra academia</div>
          </span>
          <span class="row-meta">3</span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
        <button class="row">
          <span class="row-ic" aria-hidden="true"><i class="ti ti-tags"></i></span>
          <span class="row-body">
            <div class="row-title">Categorias</div>
            <div class="row-sub">Peito · Costas · Bíceps · Tríceps · Pernas…</div>
          </span>
          <span class="row-meta">7</span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
        <button class="row">
          <span class="row-ic" aria-hidden="true"><i class="ti ti-barbell"></i></span>
          <span class="row-body">
            <div class="row-title">Exercícios</div>
            <div class="row-sub">Nome, imagem/GIF e categoria</div>
          </span>
          <span class="row-meta">42</span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
        <button class="row">
          <span class="row-ic" aria-hidden="true"><i class="ti ti-calendar-event"></i></span>
          <span class="row-body">
            <div class="row-title">Dias de treino</div>
            <div class="row-sub">Selecione os exercícios de cada dia</div>
          </span>
          <span class="row-meta">4</span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <!-- Dados -->
    <div>
      <div class="group-label">Dados</div>
      <div class="group">
        <button class="row">
          <span class="row-ic" aria-hidden="true"><i class="ti ti-wand"></i></span>
          <span class="row-body">
            <div class="row-title">Gerar exemplo</div>
            <div class="row-sub">Categorias e exercícios de demonstração</div>
          </span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
        <button class="row">
          <span class="row-ic" aria-hidden="true"><i class="ti ti-download"></i></span>
          <span class="row-body">
            <div class="row-title">Exportar backup (JSON)</div>
            <div class="row-sub">Tudo, exceto o histórico de peso</div>
          </span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
        <button class="row">
          <span class="row-ic" aria-hidden="true"><i class="ti ti-share-2"></i></span>
          <span class="row-body">
            <div class="row-title">Exportar exercícios (JSON)</div>
            <div class="row-sub">Exercícios + categorias, para compartilhar</div>
          </span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
        <button class="row">
          <span class="row-ic solid" aria-hidden="true"><i class="ti ti-upload"></i></span>
          <span class="row-body">
            <div class="row-title">Importar (JSON)</div>
            <div class="row-sub warn">Substitui todos os dados atuais</div>
          </span>
          <i class="ti ti-chevron-right chev" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="footer-hint">
      Todos os dados ficam apenas neste dispositivo (IndexedDB). Sem login, sem servidor.
    </div>
    <div class="home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
