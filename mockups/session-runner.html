<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyOneGym — Active session runner (reference mockup)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --surface-0: #F4EEEC;
      --surface-1: #FAF6F5;
      --surface-2: #FFFFFF;
      --text-primary: #1A1614;
      --text-secondary: #6B615F;
      --text-muted: #A29996;
      --border: rgba(26, 22, 20, 0.09);
      --border-strong: rgba(26, 22, 20, 0.18);
      --bg-accent: #F7EAE7;
      --border-accent: #D9B6B1;
      --text-accent: #7A3634;
      --fill-accent: #B8524E;
      --on-accent: #FFFFFF;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #1B1817;
        --surface-1: #221E1D;
        --surface-2: #2A2624;
        --text-primary: #F5EFED;
        --text-secondary: #A79E9C;
        --text-muted: #6B615F;
        --border: rgba(245, 239, 237, 0.12);
        --border-strong: rgba(245, 239, 237, 0.24);
        --bg-accent: #3B2A28;
        --border-accent: #6D3E3A;
        --text-accent: #E6B5B0;
        --fill-accent: #C77373;
        --on-accent: #1A1614;
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--surface-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: var(--font-sans);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      width: 340px;
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 28px;
      padding: 14px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 2px 6px 0; font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .status-bar .right { display: inline-flex; gap: 6px; align-items: center; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 2px 2px 4px; gap: 8px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 10px; border: 0.5px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 17px; cursor: pointer; flex-shrink: 0; font-family: inherit; }
    .screen-title { font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1; text-align: center; min-width: 0; }

    .session-hero { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 14px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
    .session-day { font-size: 16px; font-weight: 500; color: var(--text-primary); line-height: 1.25; }
    .session-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
    .gym-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: var(--bg-accent); color: var(--text-accent); border-radius: 999px; font-size: 11px; font-weight: 500; }
    .start-time { font-size: 11px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 4px; }

    .progress-row { padding: 0 2px; display: flex; flex-direction: column; gap: 5px; }
    .progress-head { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-secondary); font-weight: 500; }
    .progress-head .num { color: var(--fill-accent); font-weight: 500; }
    .progress-bar { height: 4px; background: var(--surface-0); border-radius: 2px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--fill-accent); border-radius: 2px; width: 60%; }

    .entries { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
    .entry { display: flex; align-items: center; gap: 10px; padding: 8px 10px 8px 8px; border-radius: 10px; background: var(--surface-1); }
    .entry.done { opacity: 0.55; }
    .entry.done .entry-name { text-decoration: line-through; }
    .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-strong); background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: transparent; flex-shrink: 0; font-size: 12px; cursor: pointer; }
    .checkbox.checked { background: var(--fill-accent); border-color: var(--fill-accent); color: var(--on-accent); }
    .entry-body { flex: 1; min-width: 0; }
    .entry-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .entry-cat { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
    .used-weight { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; cursor: pointer; font-family: inherit; }
    .used-weight .unit { font-size: 10px; color: var(--text-secondary); font-weight: 500; }
    .used-weight .pencil { font-size: 11px; color: var(--text-muted); margin-left: 2px; }
    .used-weight.empty { border-style: dashed; border-color: var(--border-accent); color: var(--text-accent); font-size: 11px; }

    .complete-btn { background: var(--fill-accent); color: var(--on-accent); border: 0; border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; font-family: inherit; }

    .home-indicator { width: 96px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 8px auto 0; }
  </style>
</head>
<body>
  <main class="phone" aria-label="Sessão em andamento">
    <div class="status-bar" aria-hidden="true">
      <span>9:41</span>
      <span class="right"><i class="ti ti-wifi"></i><i class="ti ti-battery"></i></span>
    </div>

    <div class="top-bar">
      <button class="icon-btn" aria-label="Voltar"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <div class="screen-title">Treino em andamento</div>
      <button class="icon-btn" aria-label="Mais opções (excluir sessão)"><i class="ti ti-dots-vertical" aria-hidden="true"></i></button>
    </div>

    <div class="session-hero">
      <div class="session-day">Dia 1 — Peito e tríceps</div>
      <div class="session-meta">
        <span class="gym-pill"><i class="ti ti-building" style="font-size:11px" aria-hidden="true"></i> Academia Central</span>
        <span class="start-time"><i class="ti ti-clock" style="font-size:11px" aria-hidden="true"></i> iniciado às 9:30</span>
      </div>
    </div>

    <div class="progress-row" aria-label="Progresso do treino">
      <div class="progress-head">
        <span><span class="num">3</span> de 5 concluídos</span>
        <span>60%</span>
      </div>
      <div class="progress-bar" aria-hidden="true"><div class="progress-bar-fill"></div></div>
    </div>

    <ul class="entries">
      <li class="entry done">
        <button class="checkbox checked" aria-label="Supino reto concluído — tocar para desmarcar"><i class="ti ti-check" aria-hidden="true"></i></button>
        <div class="entry-body">
          <div class="entry-name">Supino reto</div>
          <div class="entry-cat">Peito</div>
        </div>
        <button class="used-weight" aria-label="Peso usado: 40 quilos — tocar para editar">40<span class="unit">KG</span> <i class="ti ti-pencil pencil" aria-hidden="true"></i></button>
      </li>
      <li class="entry done">
        <button class="checkbox checked" aria-label="Supino inclinado concluído"><i class="ti ti-check" aria-hidden="true"></i></button>
        <div class="entry-body">
          <div class="entry-name">Supino inclinado</div>
          <div class="entry-cat">Peito</div>
        </div>
        <button class="used-weight" aria-label="Peso usado: 35 quilos">35<span class="unit">KG</span> <i class="ti ti-pencil pencil" aria-hidden="true"></i></button>
      </li>
      <li class="entry done">
        <button class="checkbox checked" aria-label="Crucifixo concluído"><i class="ti ti-check" aria-hidden="true"></i></button>
        <div class="entry-body">
          <div class="entry-name">Crucifixo</div>
          <div class="entry-cat">Peito</div>
        </div>
        <button class="used-weight" aria-label="Peso usado: 15 quilos">15<span class="unit">KG</span> <i class="ti ti-pencil pencil" aria-hidden="true"></i></button>
      </li>
      <li class="entry">
        <button class="checkbox" aria-label="Tríceps na corda — marcar como concluído"></button>
        <div class="entry-body">
          <div class="entry-name">Tríceps na corda</div>
          <div class="entry-cat">Tríceps</div>
        </div>
        <button class="used-weight" aria-label="Peso usado: 25 libras">25<span class="unit">LB</span> <i class="ti ti-pencil pencil" aria-hidden="true"></i></button>
      </li>
      <li class="entry">
        <button class="checkbox" aria-label="Tríceps testa — marcar como concluído"></button>
        <div class="entry-body">
          <div class="entry-name">Tríceps testa</div>
          <div class="entry-cat">Tríceps</div>
        </div>
        <button class="used-weight empty" aria-label="Sem peso definido — tocar para inserir">definir</button>
      </li>
    </ul>

    <button class="complete-btn"><i class="ti ti-check" aria-hidden="true"></i> Concluir treino</button>
    <div class="home-indicator" aria-hidden="true"></div>
  </main>
</body>
</html>
